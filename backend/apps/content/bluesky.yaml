id: bluesky
name: "Bluesky"
category: social
website: https://bsky.app
description: "Decentralized social network (AT Protocol)."

import:
  one_off:
    feasible: true
    options:
      - id: builtin
        name: Official
        official: true
        url: https://bsky.app/settings/account
        description: |
          Bluesky's first-party export produces a CAR (Content Addressable aRchive) file containing your full repository (posts, likes, follows, etc.) via the AT Protocol. Available in Settings on web and mobile.
        seed_prompt: |
          Help me import my Bluesky data. Walk me through exporting my repo CAR file from bsky.app Settings, then drop the .car file in imports/bluesky/ and explain how to parse it.

  continuous_sync:
    feasible: false
    reason: |
      Bluesky's AT Protocol is open and well-documented, but there is no turnkey end-user app that continuously syncs your own repo to a local folder. Re-running the official CAR export periodically is the closest sanctioned path.
