id: peloton
name: "Peloton"
category: health
website: https://www.onepeloton.com
description: "Connected bike / tread workout platform."

import:
  one_off:
    feasible: true
    options:
      - id: workout-csv
        name: Official
        official: true
        url: https://members.onepeloton.com/preferences/workouts
        description: |
          Peloton's first-party workout history download. Produces a CSV of all your past workouts (date, type, duration, instructor, output) from the member preferences page.
        seed_prompt: |
          Help me import my Peloton workout history. Walk me through downloading the workouts CSV from members.onepeloton.com/preferences/workouts and dropping it under imports/peloton/.

  continuous_sync:
    feasible: false
    reason: |
      Peloton has no documented public API and no turnkey continuous-sync product. Ongoing sync would require a custom unofficial integration against the member-site API.
