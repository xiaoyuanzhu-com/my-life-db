id: deepseek
name: "DeepSeek"
category: chat
website: https://chat.deepseek.com
description: "Chinese open-weights AI lab's assistant."

import:
  one_off:
    feasible: false
    reason: |
      DeepSeek does not provide a documented user-facing export for chat.deepseek.com conversation history. Capturing chats currently requires manual copy-paste or a custom scraper against the logged-in web UI, neither of which we recommend as a sanctioned import path.

  continuous_sync:
    feasible: false
    reason: |
      No public continuous-sync or conversation-streaming API exists for DeepSeek chat history. The DeepSeek developer API serves a separate stateless inference endpoint, not your chat.deepseek.com archive.
