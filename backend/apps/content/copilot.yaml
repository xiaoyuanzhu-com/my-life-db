id: copilot
name: "Microsoft Copilot"
category: chat
website: https://copilot.microsoft.com
description: "Microsoft's conversational AI (formerly Bing Chat)."

import:
  one_off:
    feasible: true
    options:
      - id: privacy-dashboard
        name: Official
        official: true
        url: https://account.microsoft.com/privacy
        description: |
          Microsoft's account-wide privacy dashboard. "Download your data" produces an export of activity tied to your Microsoft account, including Copilot interactions.
        seed_prompt: |
          Help me export my Microsoft Copilot chat history. Walk me through the Microsoft privacy dashboard at account.microsoft.com/privacy → Download your data, then place the resulting files under imports/copilot/.

  continuous_sync:
    feasible: false
    reason: |
      Microsoft does not expose a continuous export or conversation-streaming API for Copilot consumer chat history. Ongoing sync would require a custom integration that does not currently exist.
