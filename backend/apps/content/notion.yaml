id: notion
name: Notion
category: notes
website: https://www.notion.so
description: All-in-one workspace for notes, docs, and databases.

import:
  one_off:
    feasible: true
    options:
      - id: workspace-export
        name: Official
        official: true
        url: https://www.notion.so/help/export-your-content
        description: |
          Notion's first-party workspace export from the web app: Settings & members → Settings → Export all workspace content. Markdown & CSV is the most useful format; preserves nested page hierarchy as nested folders. Inter-page links become file paths and comments are stripped.
        seed_prompt: |
          Help me import my Notion workspace export. Walk me through running the export from Settings → Export all workspace content (Markdown & CSV, include subpages, create folders for subpages), unpacking it under imports/notion/, and suggesting a plan if the folder depth is excessive.
      - id: per-page-export
        name: Per-page export
        official: true
        description: |
          Open a page → ··· menu → Export → Markdown & CSV. Same format as workspace export but scoped to one page subtree. Useful when you only want a slice.
        seed_prompt: |
          Help me export a single Notion page (and its subpages) via the page's ··· → Export → Markdown & CSV. Walk me through landing the resulting folder under imports/notion/.

  continuous_sync:
    feasible: false
    reason: |
      Notion's API exposes pages and databases but there is no off-the-shelf tool that mirrors a workspace into a local folder. Continuous sync would require a custom API integration.
