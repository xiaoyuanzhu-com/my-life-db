id: mi-fitness
name: "Mi Fitness"
category: health
website: https://www.mi.com/global/mifitness
description: "Data hub for Xiaomi Mi Bands, Amazfit watches, and Mijia scales."

import:
  one_off:
    feasible: false
    reason: |
      Xiaomi / Mi Fitness has no clearly documented end-user export for fitness and wearable data. Account-level data requests via Mi Account exist but the contents and availability of fitness/wearable history vary by region and are not a reliable export path.

  continuous_sync:
    feasible: false
    reason: |
      Mi Fitness has no public API and no turnkey continuous-sync product. Ongoing sync would require a custom unofficial integration against the app's private API.
