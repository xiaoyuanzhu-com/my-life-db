id: garmin
name: "Garmin Connect"
category: health
website: https://connect.garmin.com
description: "GPS watch data: activities, daily steps, heart rate, sleep, stress."

import:
  one_off:
    feasible: true
    options:
      - id: account-export
        name: Official
        official: true
        url: https://www.garmin.com/account/datamanagement/exportdata
        description: |
          Garmin's first-party account data export. Produces a zip with FIT/TCX/GPX activity files, daily wellness summaries (steps, HR, stress, Body Battery), sleep sessions and stages, and personal records. Email-delivered, can take hours to days.
        seed_prompt: |
          Help me import my Garmin Connect archive. Walk me through requesting my data at https://www.garmin.com/account/datamanagement/exportdata, waiting for the email, then once I have the zip, unpacking activities (FIT/TCX/GPX), daily wellness summaries, and sleep data into imports/garmin/ preserving the original folder layout.

  continuous_sync:
    feasible: false
    reason: |
      Garmin Connect has no turnkey continuous-sync product that drops files into a local folder. The Connect IQ / Health API exists but is gated and oriented at developer integrations; ongoing sync would require a custom integration.
