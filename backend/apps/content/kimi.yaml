id: kimi
name: "Kimi"
category: chat
website: https://kimi.moonshot.cn
description: "Moonshot AI's long-context conversational assistant."

import:
  one_off:
    feasible: false
    reason: |
      Kimi does not provide a documented user-facing export for chat history. Capturing chats currently requires manual copy-paste or a custom scraper against the logged-in web UI, neither of which we recommend as a sanctioned import path.

  continuous_sync:
    feasible: false
    reason: |
      No public continuous-sync or conversation-streaming API exists for Kimi chat history.
